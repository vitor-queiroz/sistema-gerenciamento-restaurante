<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dom Palladar – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Raleway:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Raleway', sans-serif;
      background: radial-gradient(ellipse at 60% 0%, #a85c10 0%, #5a2e00 40%, #0d0d0d 100%);
      color: #fff;
    }
 
    a.back {
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #fff;
      text-decoration: none;
      opacity: .85;
    }
    a.back:hover { opacity: 1; }
 
    .center {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 16px 40px;
    }
 
    .card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 48px 40px 40px;
      width: 100%;
      max-width: 560px;
      text-align: center;
    }
 
    .brand {
      font-family: 'Cinzel', serif;
      font-size: 30px;
      color: #F5A623;
      letter-spacing: 4px;
      margin-bottom: 16px;
    }
 
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 32px;
    }
 
    .field { text-align: left; margin-bottom: 20px; }
 
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
    }
 
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap svg {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: #F5A623;
    }
    .input-wrap input {
      width: 100%;
      background: #111;
      border: 1.5px solid #F5A623;
      border-radius: 8px;
      color: #fff;
      font-family: 'Raleway', sans-serif;
      font-size: 14px;
      padding: 14px 14px 14px 44px;
      outline: none;
    }
    .input-wrap input::placeholder { color: #555; }
    .input-wrap input:focus { box-shadow: 0 0 0 3px rgba(245,166,35,.15); }
 
    button {
      width: 100%;
      margin-top: 8px;
      padding: 16px;
      background: #F5A623;
      border: none;
      border-radius: 8px;
      color: #111;
      font-family: 'Raleway', sans-serif;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background .2s;
    }
    button:hover { background: #FFD07A; }
 
    .signup {
      display: block;
      margin-top: 20px;
      font-size: 14px;
      color: #F5A623;
      text-decoration: none;
    }
    .signup:hover { text-decoration: underline; }
  </style>
</head>
<body>
 
  <a href="#" class="back">
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" width="18" height="18">
      <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
    </svg>
    Voltar ao Início
  </a>
 
  <div class="center">
    <div class="card">
      <div class="brand">DOM PALLADAR</div>
      <h1>Login</h1>
 
      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
          </svg>
          <input type="email" placeholder="seu@email.com" />
        </div>
      </div>
 
      <div class="field">
        <label>Senha</label>
        <div class="input-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
          </svg>
          <input type="password" placeholder="Sua senha" />
        </div>
      </div>
 
      <button>Entrar</button>
      <a href="#" class="signup">Não tem uma conta? Cadastre-se</a>
    </div>
  </div>
 
</body>
</html>
