<h1>DomPalladar Login</h1>

<input
  type="email"
  [(ngModel)]="email"
  placeholder="E-mail"
  [disabled]="carregando">

<br><br>

<input
  type="password"
  [(ngModel)]="senha"
  placeholder="Senha"
  [disabled]="carregando">

<br><br>

<button (click)="entrar()" [disabled]="carregando">
  {{ carregando ? 'Entrando...' : 'Entrar' }}
</button>
