<div class="pagina-login">

  <div class="card-login">

    <div class="login-cabecalho">
      <h1>Dom Palladar</h1>
      <p>Sistema de Gerenciamento de Restaurante</p>
    </div>

    <div class="login-form">

      <div class="campo">
        <label>E-mail</label>
        <input
          type="email"
          [(ngModel)]="email"
          placeholder="seu@email.com"
          [disabled]="carregando">
      </div>

      <div class="campo">
        <label>Senha</label>
        <input
          type="password"
          [(ngModel)]="senha"
          placeholder="••••••••"
          [disabled]="carregando">
      </div>

      <button class="btn-entrar" (click)="entrar()" [disabled]="carregando">
        {{ carregando ? 'Entrando...' : 'Entrar' }}
      </button>

    </div>

  </div>

</div>
