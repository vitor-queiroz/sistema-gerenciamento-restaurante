<h1>Cadastro de Funcionários</h1>

<input
  type="text"
  [(ngModel)]="nome"
  placeholder="Nome do funcionário">

<br><br>

<input
  type="email"
  [(ngModel)]="email"
  placeholder="E-mail">

<br><br>

<input
  type="password"
  [(ngModel)]="senha"
  [placeholder]="idFuncionarioEditando ? 'Nova senha (deixe em branco para manter)' : 'Senha'">

<br><br>

<button (click)="salvarFuncionario()">
  Salvar Funcionário
</button>

<button *ngIf="idFuncionarioEditando" (click)="cancelarEdicao()">
  Cancelar edição
</button>

<hr>

<h2>Funcionários cadastrados</h2>

<div *ngFor="let funcionario of funcionarios">

  <h3>{{ funcionario.nome }}</h3>

  <p>{{ funcionario.email }}</p>

  <p>
    <strong>Senha:</strong>
    {{ funcionario.senha ? 'Definida' : 'Não definida' }}
  </p>

  <button (click)="editarFuncionario(funcionario)"> Editar </button>

  <button (click)="excluirFuncionario(funcionario.id)"> Excluir </button>

  <button (click)="redefinirSenha(funcionario)"> Redefinir senha </button>

  <hr>

</div>
