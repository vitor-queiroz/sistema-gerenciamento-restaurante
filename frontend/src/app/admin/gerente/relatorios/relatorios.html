<h1>Relatórios Dom Palladar</h1>

<hr>

<h3>Faturamento Total</h3>
<p>R$ {{ faturamentoTotal }}</p>

<h3>Pedidos Pagos</h3>
<p>{{ totalPedidos }}</p>

<h3>Prato Mais Vendido</h3>
<p>{{ pratoMaisVendido }}</p>

<h3>Ranking de Pratos</h3>

<ul>
  <li *ngFor="let prato of rankingPratos">
    {{ prato.nome }} - {{ prato.quantidade }} vendas
  </li>
</ul>

<hr>

<h2>Pedidos Pagos</h2>

<div *ngFor="let pedido of pedidos">
  <p>
    {{ pedido.cliente }} - R$ {{ pedido.total }}
  </p>
</div>
