<section class="reserva-container">

  <div class="reserva-card">

    <h1 class="titulo-reserva">
      Faça sua Reserva
    </h1>

    <p class="subtitulo-reserva">
      Reserve sua experiência gastronômica no Dom Palladar.
    </p>

    <form class="form-reserva">

      <div class="grupo-input">

        <label>Nome completo</label>

        <input
          type="text"
          placeholder="Digite seu nome">
      </div>

      <div class="grupo-input">

        <label>Telefone</label>

        <input
          type="tel"
          placeholder="(11) 99999-9999">
      </div>

      <div class="grupo-input">

        <label>Quantidade de pessoas</label>

        <select>
          <option>1 Pessoa</option>
          <option>2 Pessoas</option>
          <option>3 Pessoas</option>
          <option>4 Pessoas</option>
          <option>5 Pessoas</option>
          <option>6+ Pessoas</option>
        </select>

      </div>

      <div class="grupo-input">

        <label>Data da reserva</label>

        <input type="date">

      </div>

      <div class="grupo-input">

        <label>Horário</label>

        <select>
          <option>18:00</option>
          <option>19:00</option>
          <option>20:00</option>
          <option>21:00</option>
          <option>22:00</option>
        </select>

      </div>

      <div class="grupo-input">

        <label>Mesa desejada</label>

        <select>
          <option>Área interna</option>
          <option>Área externa</option>
          <option>Próximo à janela</option>
          <option>Área VIP</option>
        </select>

      </div>

      <button class="botao-confirmar">
        Confirmar Reserva
      </button>

    </form>

  </div>

</section>
