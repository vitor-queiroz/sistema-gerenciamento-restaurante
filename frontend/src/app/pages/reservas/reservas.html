<section class="reserva-container">

  <div class="reserva-card">

    <h1 class="titulo-reserva">
      Faça sua Reserva
    </h1>

    <p class="subtitulo-reserva">
      Reserve sua experiência gastronômica no Dom Palladar.
    </p>

    <form class="form-reserva">

      <div class="grupo-input">

        <label>Nome completo</label>

        <input type="text" [(ngModel)]="nome" name="nome" placeholder="Digite seu nome">
      </div>

      <div class="grupo-input">

        <label>Telefone</label>

        <input type="tel" [(ngModel)]="telefone" name="telefone" maxlength="11" pattern="[0-9]{11}"
          placeholder="(11) 99999-9999">
      </div>

      <div class="grupo-input">

        <label>Quantidade de pessoas</label>

        <select [(ngModel)]="pessoas" name="pessoas">
          <option>1 Pessoa</option>
          <option>2 Pessoas</option>
          <option>3 Pessoas</option>
          <option>4 Pessoas</option>
          <option>5 Pessoas</option>
          <option>6+ Pessoas</option>
        </select>

      </div>

      <div class="grupo-input">

        <label>Data da reserva</label>

        <input type="date" [(ngModel)]="data" name="data">

      </div>

      <div class="grupo-input">

        <label>Horário</label>

        <select [(ngModel)]="horario" name="horario">
          <option>11:00</option>
          <option>12:00</option>
          <option>13:00</option>
          <option>14:00</option>
          <option>18:00</option>
          <option>19:00</option>
          <option>20:00</option>
          <option>21:00</option>
          <option>22:00</option>
        </select>

      </div>

      <div class="grupo-input">

        <label>Mesa desejada</label>

        <select [(ngModel)]="mesa" name="mesa">
          <option value="">Selecione uma mesa</option>

          <option *ngFor="let mesa of mesas" [value]="mesa.numero" [disabled]="mesa.status === 'Ocupada'">
            Mesa {{ mesa.numero }} - {{ mesa.status }}
          </option>
        </select>

      </div>

      <button class="botao-confirmar" type="button" (click)="salvarReserva()">
        Confirmar Reserva
      </button>

    </form>

  </div>

</section>
